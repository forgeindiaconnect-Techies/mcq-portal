services:
  - type: web
    name: fic-mcq-portal
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: DATABASE_URL
        fromDatabase:
          name: fic-portal-db
          property: connectionURI
      - key: DATABASE_USERNAME
        fromDatabase:
          name: fic-portal-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: fic-portal-db
          property: password

databases:
  - name: fic-portal-db
    plan: free
    databaseName: fic_portal
    postgresMajorVersion: "16"
