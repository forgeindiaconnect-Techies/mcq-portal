# ===================================================
# Render Deployment Profile
# This profile is activated on Render via SPRING_PROFILES_ACTIVE=render
# Your local application.properties remains unchanged.
# ===================================================

# PostgreSQL datasource (values injected from Render environment variables)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate for PostgreSQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Server port (Render sets PORT env variable)
server.port=${PORT:8080}

# Thymeleaf
spring.thymeleaf.cache=true

# Session
server.servlet.session.timeout=45m

# App settings
fic.quiz.duration-minutes=30
