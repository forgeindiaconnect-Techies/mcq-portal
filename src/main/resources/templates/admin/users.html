<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Users')}"></head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>
<div class="app-shell">
    <div th:replace="~{fragments/layout :: adminSidebar}"></div>
    <main class="app-main">
        <h1>User Management</h1>
        <form class="search-row" method="get"><input class="form-control" name="q" th:value="${q}" placeholder="Search users"><button class="btn btn-primary">Search</button></form>
        <div class="table-responsive card-form">
            <table class="table align-middle">
                <thead><tr><th>Name</th><th>Email</th><th>Role</th><th></th></tr></thead>
                <tbody>
                <tr th:each="user : ${users.content}">
                    <td th:text="${user.fullname}">Name</td><td th:text="${user.email}">Email</td><td th:text="${user.role}">Role</td>
                    <td><form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"><button class="btn btn-sm btn-outline-danger">Delete</button></form></td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script><script th:src="@{/js/app.js}"></script>
</body>
</html>
