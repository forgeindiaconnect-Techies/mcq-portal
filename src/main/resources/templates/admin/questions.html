<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Questions')}"></head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>
<div class="app-shell">
    <div th:replace="~{fragments/layout :: adminSidebar}"></div>
    <main class="app-main">
        <h1>Question Management</h1>
        <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
        <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
        <form class="card-form mb-4" th:action="@{/admin/questions}" th:object="${questionForm}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" th:field="*{id}">
            <div class="row g-2">
                <div class="col-md-4">
                    <label class="form-label">Category</label>
                    <select class="form-select mb-2" th:field="*{category}" required>
                        <option value="">Choose topic</option>
                        <option th:each="category : ${categories}" th:value="${category}" th:text="${category}">Topic</option>
                    </select>
                </div>
                <div class="col-md-8">
                    <label class="form-label">Question</label>
                    <textarea class="form-control mb-2" th:field="*{question}" required></textarea>
                </div>
            </div>
            <div class="row g-2">
                <div class="col-md-6"><input class="form-control" th:field="*{optionA}" placeholder="Option A" required></div>
                <div class="col-md-6"><input class="form-control" th:field="*{optionB}" placeholder="Option B" required></div>
                <div class="col-md-6"><input class="form-control" th:field="*{optionC}" placeholder="Option C" required></div>
                <div class="col-md-6"><input class="form-control" th:field="*{optionD}" placeholder="Option D" required></div>
            </div>
            <label class="form-label mt-2">Correct Answer</label>
            <select class="form-select" th:field="*{correctAnswer}" required><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option></select>
            <button class="btn btn-primary mt-3" type="submit">Save Question</button>
        </form>
        <form class="search-row" method="get"><input class="form-control" name="q" th:value="${q}" placeholder="Search questions"><button class="btn btn-primary">Search</button></form>
        <div class="table-responsive card-form">
            <table class="table align-middle">
                <thead><tr><th>Category</th><th>Question</th><th>Options</th><th>Answer Key</th><th></th></tr></thead>
                <tbody>
                <tr th:each="question : ${questions.content}">
                    <td th:text="${question.category}">Category</td>
                    <td th:text="${question.question}">Question</td>
                    <td>
                        <div th:text="'A. ' + ${question.optionA}">A</div>
                        <div th:text="'B. ' + ${question.optionB}">B</div>
                        <div th:text="'C. ' + ${question.optionC}">C</div>
                        <div th:text="'D. ' + ${question.optionD}">D</div>
                    </td>
                    <td>
                        <span class="answer-pill" th:text="${question.correctAnswer}">A</span>
                    </td>
                    <td class="d-flex gap-2"><a class="btn btn-sm btn-outline-primary" th:href="@{/admin/questions/{id}/edit(id=${question.id})}">Edit</a><form th:action="@{/admin/questions/{id}/delete(id=${question.id})}" method="post"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"><button class="btn btn-sm btn-outline-danger">Delete</button></form></td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script><script th:src="@{/js/app.js}"></script>
</body>
</html>
