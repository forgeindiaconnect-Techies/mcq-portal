<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Admin Certificates')}"></head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>
<div class="app-shell"><div th:replace="~{fragments/layout :: adminSidebar}"></div><main class="app-main">
    <h1>Certificate Management</h1>
    <form class="search-row" method="get"><input class="form-control" name="q" th:value="${q}" placeholder="Search certificates"><button class="btn btn-primary">Search</button></form>
    <div class="table-responsive card-form"><table class="table align-middle"><thead><tr><th>ID</th><th>Student</th><th>Percentage</th><th>Issue Date</th><th></th></tr></thead><tbody>
    <tr th:each="certificate : ${certificates.content}"><td th:text="${certificate.certificateId}"></td><td th:text="${certificate.studentName}"></td><td th:text="${certificate.percentage} + '%'"></td><td th:text="${certificate.issueDate}"></td><td class="d-flex gap-2"><a class="btn btn-sm btn-outline-success" th:href="@{/certificates/{id}(id=${certificate.id})}">View</a><form th:action="@{/admin/certificates/{id}/reissue(id=${certificate.id})}" method="post"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"><button class="btn btn-sm btn-outline-primary">Reissue</button></form><form th:action="@{/admin/certificates/{id}/delete(id=${certificate.id})}" method="post"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"><button class="btn btn-sm btn-outline-danger">Delete</button></form></td></tr>
    </tbody></table></div>
</main></div>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script><script th:src="@{/js/app.js}"></script>
</body>
</html>
