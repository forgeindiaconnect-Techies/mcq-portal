<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Admin Dashboard')}"></head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>
<div class="app-shell">
    <div th:replace="~{fragments/layout :: adminSidebar}"></div>
    <main class="app-main">
        <div class="dashboard-title">
            <img th:src="@{/image/logo-circle.png}" alt="FIC Logo">
            <div>
                <p class="eyebrow">Administrator</p>
                <h1>Dashboard</h1>
            </div>
        </div>
        <div class="stats-grid">
            <div class="stat-card"><span th:text="${totalUsers}">0</span><small>Total Users</small></div>
            <div class="stat-card"><span th:text="${totalQuestions}">0</span><small>Total Questions</small></div>
            <div class="stat-card"><span th:text="${totalExams}">0</span><small>Exams Conducted</small></div>
            <div class="stat-card"><span th:text="${totalCertificates}">0</span><small>Certificates Issued</small></div>
            <div class="stat-card"><span th:text="${#numbers.formatDecimal(averageScore, 1, 2)} + '%'">0%</span><small>Average Score</small></div>
        </div>
    </main>
</div>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script><script th:src="@{/js/app.js}"></script>
</body>
</html>
