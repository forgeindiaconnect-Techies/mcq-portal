<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Answer Key')}"></head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>
<div class="app-shell">
    <div th:replace="~{fragments/layout :: adminSidebar}"></div>
    <main class="app-main">
        <section class="answer-key-panel">
            <div class="answer-key-head">
                <div>
                    <p class="eyebrow">Answer Key</p>
                    <h1 th:text="${answerCategory} + ' - 50 MCQ Answers'">Cybersecurity - 50 MCQ Answers</h1>
                </div>
                <form method="get" th:action="@{/admin/answer-key}" class="answer-key-filter">
                    <label class="form-label" for="answerCategory">Topic</label>
                    <select id="answerCategory" class="form-select" name="answerCategory" onchange="this.form.submit()">
                        <option th:each="category : ${categories}" th:value="${category}" th:text="${category}" th:selected="${category == answerCategory}">Topic</option>
                    </select>
                </form>
            </div>
            <div class="table-responsive">
                <table class="table answer-key-table align-middle">
                    <thead>
                    <tr>
                        <th>No.</th>
                        <th>Question</th>
                        <th>Answer</th>
                        <th>Correct Option</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="question, iter : ${answerKeyQuestions}">
                        <td th:text="${iter.count}">1</td>
                        <td th:text="${question.question}">Question</td>
                        <td><span class="answer-pill" th:text="${question.correctAnswer}">A</span></td>
                        <td th:switch="${question.correctAnswer}">
                            <span th:case="'A'" th:text="${question.optionA}">Option A</span>
                            <span th:case="'B'" th:text="${question.optionB}">Option B</span>
                            <span th:case="'C'" th:text="${question.optionC}">Option C</span>
                            <span th:case="'D'" th:text="${question.optionD}">Option D</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script><script th:src="@{/js/app.js}"></script>
</body>
</html>
