<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="nav" class="navbar navbar-expand-lg navbar-dark bg-fic sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/}"><span class="brand-mark"><img th:src="@{/image/logo-circle.png}" alt="FIC"></span> Portal</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#topNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="topNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/about}">About</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/contact}">Contact</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/verify}">Verify Certificate</a></li>
                <li class="nav-item" sec:authorize="hasRole('USER')"><a class="nav-link" th:href="@{/leaderboard}">Leaderboard</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link" th:href="@{/admin/dashboard}">Admin</a></li>
            </ul>
            <div class="d-flex gap-2 align-items-center">
                <button class="btn btn-sm btn-outline-light" id="darkModeToggle" type="button"><i class="bi bi-moon-stars"></i></button>
                <a sec:authorize="isAnonymous()" class="btn btn-sm btn-light" th:href="@{/login}">Login</a>
                <a sec:authorize="isAnonymous()" class="btn btn-sm btn-warning" th:href="@{/register}">Register</a>
                <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="btn btn-sm btn-outline-light" type="submit">Logout</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<div th:fragment="sidebar" class="sidebar">
    <a th:href="@{/dashboard}"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a th:href="@{/quiz/start}"><i class="bi bi-play-circle"></i> Start Quiz</a>
    <a th:href="@{/results}"><i class="bi bi-clipboard-data"></i> Results</a>
    <a th:href="@{/certificates}"><i class="bi bi-award"></i> Certificates</a>
    <a th:href="@{/profile}"><i class="bi bi-person-gear"></i> Profile</a>
    <a th:href="@{/leaderboard}"><i class="bi bi-trophy"></i> Leaderboard</a>
</div>

<div th:fragment="adminSidebar" class="sidebar">
    <a th:href="@{/admin/dashboard}"><i class="bi bi-grid"></i> Dashboard</a>
    <a th:href="@{/admin/users}"><i class="bi bi-people"></i> Users</a>
    <a th:href="@{/admin/questions}"><i class="bi bi-question-circle"></i> Questions</a>
    <a th:href="@{/admin/answer-key}"><i class="bi bi-check2-square"></i> Answer Key</a>
    <a th:href="@{/admin/results}"><i class="bi bi-bar-chart"></i> Results</a>
    <a th:href="@{/admin/certificates}"><i class="bi bi-award"></i> Certificates</a>
</div>
</body>
</html>
