<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Certificate')}"></head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>
<main class="container py-5">
    <section class="certificate-sheet">
        <div class="watermark">
            <img th:src="@{/image/logo-circle.png}" alt="Watermark">
        </div>
        <div class="cert-ribbon">Forge India Connect</div>
        <div class="cert-logo">
            <img th:src="@{/image/logo-circle.png}" alt="FIC Logo">
            <span>FIC Talent Exam</span>
        </div>
        <h1>CERTIFICATE OF ACHIEVEMENT</h1>
        <p>This is to certify that</p>
        <h2 th:text="${certificate.studentName}">Student Name</h2>
        <p>has successfully completed the MCQ Examination</p>
        <p>with a score of</p>
        <h3 th:text="${certificate.percentage} + ' %'">90%</h3>
        <p class="text-success fw-bold">Status: PASS</p>
        <div class="cert-meta">
            <span th:text="'Date: ' + ${certificate.issueDate}">Date</span>
            <span th:text="'Certificate ID: ' + ${certificate.certificateId}">ID</span>
        </div>
        <div class="cert-footer">
            <span>Authorized Signature</span>
            <span>Official Seal</span>
        </div>
    </section>
    <div class="text-center mt-4">
        <a class="btn btn-success" th:href="@{/certificates/{id}/download(id=${certificate.id})}"><i class="bi bi-download"></i> Download Certificate PDF</a>
    </div>
</main>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script><script th:src="@{/js/app.js}"></script>
</body>
</html>
