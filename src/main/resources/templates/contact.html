<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Contact')}"></head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>
<main class="container py-5 content-narrow">
    <h1>Contact</h1>
    <form class="card-form">
        <input class="form-control mb-3" placeholder="Name" required>
        <input class="form-control mb-3" type="email" placeholder="Email" required>
        <textarea class="form-control mb-3" rows="5" placeholder="Message" required></textarea>
        <button class="btn btn-primary" type="button">Send Message</button>
    </form>
</main>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script><script th:src="@{/js/app.js}"></script>
</body>
</html>
