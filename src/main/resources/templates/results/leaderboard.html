<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Leaderboard')}"></head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>
<main class="container py-5">
    <h1>Leaderboard</h1>
    <div class="table-responsive card-form">
        <table class="table align-middle">
            <thead><tr><th>Rank</th><th>Student Name</th><th>Score</th><th>Percentage</th></tr></thead>
            <tbody>
            <tr th:each="result, iter : ${results}">
                <td th:text="${iter.count}">1</td>
                <td th:text="${result.user.fullname}">Student</td>
                <td th:text="${result.score} + '/' + ${result.totalQuestions}">0</td>
                <td th:text="${result.percentage} + '%'">0%</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script><script th:src="@{/js/app.js}"></script>
</body>
</html>
