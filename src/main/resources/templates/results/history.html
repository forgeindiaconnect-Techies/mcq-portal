<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Results')}"></head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>
<div class="app-shell">
    <div th:replace="~{fragments/layout :: sidebar}"></div>
    <main class="app-main">
        <h1>Result History</h1>
        <div th:fragment="resultTable(results)" class="table-responsive card-form">
            <table class="table align-middle">
                <thead><tr><th>Exam Date</th><th>Score</th><th>Percentage</th><th>Status</th><th></th></tr></thead>
                <tbody>
                <tr th:each="result : ${results}">
                    <td th:text="${#temporals.format(result.examDate, 'dd MMM yyyy HH:mm')}">Date</td>
                    <td th:text="${result.score} + '/' + ${result.totalQuestions}">0</td>
                    <td th:text="${result.percentage} + '%'">0%</td>
                    <td><span class="badge" th:classappend="${result.status.name() == 'PASS'} ? ' bg-success' : ' bg-danger'" th:text="${result.status}">PASS</span></td>
                    <td><a class="btn btn-sm btn-outline-primary" th:href="@{/results/{id}(id=${result.id})}">View</a></td>
                </tr>
                <tr th:if="${#lists.isEmpty(results)}"><td colspan="5" class="text-center text-muted">No attempts yet.</td></tr>
                </tbody>
            </table>
        </div>
    </main>
</div>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script><script th:src="@{/js/app.js}"></script>
</body>
</html>
