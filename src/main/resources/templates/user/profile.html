<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Profile')}"></head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>
<div class="app-shell">
    <div th:replace="~{fragments/layout :: sidebar}"></div>
    <main class="app-main">
        <h1>Profile</h1>
        <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
        <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
        <form class="card-form mb-4" th:action="@{/profile}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="row g-3">
                <div class="col-md-4"><label class="form-label">Full Name</label><input class="form-control" name="fullname" th:value="${user.fullname}" required></div>
                <div class="col-md-4"><label class="form-label">Email</label><input class="form-control" type="email" name="email" th:value="${user.email}" required></div>
                <div class="col-md-4"><label class="form-label">New Password</label><input class="form-control" type="password" name="newPassword" minlength="6"></div>
            </div>
            <button class="btn btn-primary mt-3" type="submit">Update Profile</button>
        </form>
        <h2>Exam History</h2>
        <div th:replace="~{results/history :: resultTable(${results})}"></div>
    </main>
</div>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script><script th:src="@{/js/app.js}"></script>
</body>
</html>
