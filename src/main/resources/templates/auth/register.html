<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Register')}"></head>
<body class="auth-bg">
<div th:replace="~{fragments/layout :: nav}"></div>
<main class="auth-wrap">
    <form class="auth-card needs-validation" th:action="@{/register}" method="post" novalidate>
        <h1>Register</h1>
        <p class="text-muted">Create your student account.</p>
        <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <label class="form-label">Full Name</label>
        <input class="form-control mb-3" name="fullname" th:value="${fullname}" required>
        <label class="form-label">Email</label>
        <input class="form-control mb-3" type="email" name="email" th:value="${email}" required>
        <label class="form-label">Password</label>
        <input class="form-control mb-3" type="password" name="password" required minlength="6">
        <label class="form-label">Confirm Password</label>
        <input class="form-control mb-3" type="password" name="confirmPassword" required minlength="6">
        <button class="btn btn-primary w-100" type="submit">Register</button>
        <p class="mt-3 small">Already registered? <a th:href="@{/login}">Login</a></p>
    </form>
</main>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script><script th:src="@{/js/app.js}"></script>
</body>
</html>
