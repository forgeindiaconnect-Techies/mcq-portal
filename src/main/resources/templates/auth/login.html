<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Login')}"></head>
<body class="auth-bg">
<div th:replace="~{fragments/layout :: nav}"></div>
<main class="auth-wrap">
    <form class="auth-card needs-validation" th:action="@{/login}" method="post" novalidate>
        <h1>Login</h1>
        <p class="text-muted">Access your FIC examination dashboard.</p>
        <div class="alert alert-danger" th:if="${param.error}">Invalid email or password.</div>
        <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
        <div class="alert alert-success" th:if="${param.logout}">Logged out successfully.</div>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <label class="form-label">Email</label>
        <input class="form-control mb-3" type="email" name="email" required>
        <label class="form-label">Password</label>
        <input class="form-control mb-3" type="password" name="password" required minlength="6">
        <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" name="remember-me" id="remember">
            <label class="form-check-label" for="remember">Remember me</label>
        </div>
        <button class="btn btn-primary w-100" type="submit">Login</button>
        <div class="d-flex justify-content-between mt-3 small">
            <a th:href="@{/register}">Create account</a>
            <a th:href="@{/forgot-password}">Forgot password?</a>
        </div>
    </form>
</main>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script><script th:src="@{/js/app.js}"></script>
</body>
</html>
