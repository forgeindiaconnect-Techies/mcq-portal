<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('FIC Portal')}"></head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>
<main class="home-hero">
    <div class="container py-5">
        <div class="row align-items-center g-4">
            <div class="col-lg-7">
                <p class="eyebrow">Future Intelligence Center</p>
                <h1>FIC Portal</h1>
                <p class="lead">Secure online MCQ examinations with timed quizzes, instant result calculation, leaderboards, and automatic achievement certificates.</p>
                <div class="d-flex flex-wrap gap-3">
                    <a class="btn btn-warning btn-lg" th:href="@{/register}"><i class="bi bi-person-plus"></i> Register</a>
                    <a class="btn btn-light btn-lg" th:href="@{/login}"><i class="bi bi-box-arrow-in-right"></i> Login</a>
                    <a class="btn btn-outline-light btn-lg" th:href="@{/verify}"><i class="bi bi-patch-check"></i> Verify Certificate</a>
                </div>
            </div>
            <div class="col-lg-5">
                <div class="hero-panel">
                    <div class="metric"><span>30</span><small>Minutes Timer</small></div>
                    <div class="metric"><span>50%</span><small>Pass Criteria</small></div>
                    <div class="metric"><span>PDF</span><small>Certificate Download</small></div>
                </div>
            </div>
        </div>
    </div>
</main>
<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
